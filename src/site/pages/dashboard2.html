<!doctype html>
<html lang="en" data-theme="default">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="/assets/img/favicon/favicon_meu.ico" />
        <link rel="stylesheet" href="/scss/dashboard.scss" />
        <title>Vite App</title>
        <style></style>
    </head>

    <body>
        <div class="app-ui js-app-ui">
            <header class="app-ui__header padding-x-lg@sm">
                <div class="app-ui__header-logo-wrapper">
                    <a class="app-ui__header-logo" href="#0">
                        <img title="iRedAdmin" src="/assets/img/logo.png" />
                        <div class="flex-column padding-left-sm">
                            <h4 class="color-contrast-higher">iRedAdmin</h4>
                            <p class="text-xs color-contrast-low">iRedMail Admin Panel</p>
                        </div>
                    </a>
                </div>
                <div class="app-ui__fix-menu flex flex-grow flex-basis-0 justify-end">
                    <!-- flex-grow flex-basis-0 justify-center@md -->
                    <div class="flex gap-4xs"></div>
                    <div class="flex gap-4xs">
                        <a class="app-ui__btn-header" href="#0">
                            <span
                                class="tooltip-trigger js-tooltip-trigger"
                                data-tooltip-title="Theme"
                                tabindex="0"
                            >
                                {{> switchtheme }}
                            </span>
                        </a>
                    </div>
                </div>
            </header>
            <section>
                <aside
                    class="app-ui__nav sidebar sidebar--static@md js-sidebar js-app-ui__nav"
                    data-static-class="sidenav-desktop"
                    data-sidebar-prevent-scroll="body"
                    id="app-ui-navigation"
                    aria-labelledby="#CAT Menú lateral"
                >
                    <div class="sidebar__panel">
                        <!-- <nav class="sidenav js-sidenav"></nav> -->
                    </div>
                </aside>
                <main class="app-ui__body sidebar-loaded:show">
                    <!-- start main content position-relative z-index-1 flex-grow height-100vh -->
                    <!-- #{> dashboard-home }} #{> dashboard-domains-list }} #{> dashboard-users-profile }} dashboard-users-list dashboard-system-throttle  dashboard-system-wblist -->
                    {{> dashboard-login }} {{> footer }}
                </main>
                {{> totop }}
            </section>
        </div>
        {{> svg }}
    </body>
    <script type="module" src="/js/dashboard.js"></script>
    <script type="module">
        //inicialitza el Modal dinàmics
        document.addEventListener('DOMContentLoaded', () => {
            const modalButtons = Array.from(document.querySelectorAll('.js-modal:not(.modal)'));
            if (modalButtons.length > 0) {
                modalButtons.forEach((modalButton) => {
                    const fullscreen =
                        modalButton.getAttribute('data-fullscreen') &&
                        modalButton.dataset.fullscreen == 'off'
                            ? false
                            : true;
                    const confirmClose =
                        modalButton.getAttribute('data-confirm-close') &&
                        modalButton.dataset.confirmClose == 'on'
                            ? true
                            : false;
                    new Modal(modalButton, {
                        //animateClass: 'modal--animate-translate-right',
                        fullscreen: fullscreen,
                        confirmClose: confirmClose,
                    });
                });
            }
        });
    </script>
    <script type="module">
        //inicialitza el menú de llengües
        document.addEventListener('DOMContentLoaded', () => {
            const languagePickerElements = Array.from(
                document.getElementsByClassName('js-language-picker'),
            );
            if (languagePickerElements.length > 0) {
                languagePickerElements.forEach((element) => {
                    new LanguagePicker(element, {
                        onGetLangUrl: (option) => {
                            return `#${option.value}`;
                        },
                    });
                });
            }
        });
    </script>
    <script type="module">
        // Creació d'un toast al vol
        const toastIcon = `<div class="toast__icon-wrapper margin-right-2xs"><svg class="icon"><title>error</title><use href="#error"></use></svg></div>`;
        const toastContent = `<div class="text-component text-sm">
        <h1 class="toast__title text-md
        ">Error</h1>
        <p class="toast__p">Empty password is not allowed.</p>
        </div>`;
        const toastClose = `<button class=" toast__close-btn margin-left-4xs js-toast__close-btn"><svg class="icon"><title>Close</title><use href="#close"></use></svg></button>`;
        document.addEventListener('DOMContentLoaded', () => {
            const toastObj = new Toasts();
            const fragment = `<div data-toast-interval="3000" class="toast-001 toast toast--hidden toast--top-right js-toast" role="alert" aria-live="assertive" aria-atomic="true"><div class="flex items-start justify-between">${toastIcon}${toastContent}${toastClose}</div></div>`;
            document.body.insertAdjacentHTML('beforeend', fragment);
            const toast = document.getElementsByClassName('toast-001')[0];
            toastObj.initToast(toast);
            toast.dispatchEvent(new CustomEvent('openToast'));
        });
    </script>
    <script type="module">
        // @TODO
        // Show options if account is marked as normal admin in user profile page.
        document.addEventListener('DOMContentLoaded', function () {
            const o = document.getElementById('domainadmin');
            const d = document.getElementsByClassName('normal-admin-options');
            const o2 = document.getElementById('domainGlobalAdmin');
            const d2 = document.getElementsByClassName('global-admin-options');
            const o3 = document.getElementById('create_new_domains');
            const d3 = document.getElementsByClassName('normal-admin-options-details');
            function toggleVisibility(val, elements) {
                for (var e = 0; e < elements.length; e++) {
                    elements[e].classList.toggle('is-hidden', !val);
                }
            }
            if (o && o2 && o3) {
                toggleVisibility(o.checked, d);
                o.addEventListener('click', function handleClick() {
                    toggleVisibility(o.checked, d);
                });
                toggleVisibility(!o2.checked, d2);
                o2.addEventListener('click', function handleClick() {
                    toggleVisibility(!o2.checked, d2);
                });
                toggleVisibility(o3.checked, d3);
                o3.addEventListener('click', function handleClick() {
                    toggleVisibility(o3.checked, d3);
                });
            }
        });
    </script>
</html>
